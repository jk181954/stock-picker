<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台股選股網站</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="hero">
      <h1>台股選股網站</h1>
      <p class="subtitle">每日台股全市場掃描系統</p>
    </header>

    <section class="card">
      <h2>選擇策略</h2>
      <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <button id="btnStrategy1">策略A：量縮測底完成</button>
        <button id="btnStrategy2" style="background-color: #475569;">策略B：均線多頭排列</button>
      </div>
      <p class="hint">資料已由 GitHub Actions 在背景算好，點擊按鈕可「瞬間」切換選股結果。</p>
      <div id="status" class="hint" style="color: #0f766e; font-weight: bold;"></div>
    </section>

    <section class="card">
      <h2>策略條件說明</h2>
      <ul class="rule-list">
        <li><strong>策略A：</strong>收盤 > MA5/20/60、近20日低點 < MA20、量 > 500、收盤未偏離 200MA 太遠、200MA連10日上升</li>
        <li><strong>策略B：</strong>收盤 > MA5 > MA20 > MA60，且成交量 > 1000張（測試用）</li>
      </ul>
    </section>

    <section class="card">
      <div class="result-head">
        <h2>選股結果</h2>
        <span id="resultCount" class="badge">尚未執行</span>
      </div>

      <p id="metaInfo" class="hint">資料載入中...</p>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>代號</th>
              <th>名稱</th>
              <th>收盤價</th>
              <th>MA5</th>
              <th>MA20</th>
              <th>MA60</th>
              <th>MA200</th>
              <th>20日最低收盤</th>
              <th>成交量</th>
            </tr>
          </thead>
          <tbody id="resultBody">
            <tr>
              <td colspan="9" class="empty">尚未執行任何策略</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
