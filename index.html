<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台股選股器</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f5f7fb;
      color: #222;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }
    .header {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    h1 {
      margin: 0 0 12px 0;
      font-size: 28px;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 14px;
      color: #555;
    }
    .meta-item {
      background: #eef3ff;
      border-radius: 999px;
      padding: 8px 12px;
    }
    .warning {
      margin-top: 12px;
      color: #b45309;
      font-size: 14px;
      line-height: 1.6;
    }
    .ok {
      color: #047857;
    }
    .section {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      background: #fff;
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid #e5e7eb;
      text-align: center;
      font-size: 14px;
    }
    th {
      background: #f8fafc;
      position: sticky;
      top: 0;
    }
    .muted {
      color: #6b7280;
      font-size: 13px;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .badge-match {
      background: #dcfce7;
      color: #166534;
    }
    .badge-old {
      background: #fee2e2;
      color: #991b1b;
    }
    @media (max-width: 768px) {
      body {
        padding: 12px;
      }
      th, td {
        font-size: 12px;
        padding: 8px 4px;
      }
      h1 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>台股選股器</h1>
      <div class="meta">
        <div class="meta-item">系統更新時間：<span id="updatedAt">讀取中...</span></div>
        <div class="meta-item">目標資料日：<span id="targetDate">讀取中...</span></div>
        <div class="meta-item">實際資料日：<span id="dataDate">讀取中...</span></div>
        <div class="meta-item">有效股票數：<span id="totalStocks">讀取中...</span></div>
        <div class="meta-item">FinMind 補資料數：<span id="fallbackCount">讀取中...</span></div>
      </div>
      <div id="dateWarning" class="warning"></div>
    </div>

    <div class="section">
      <div class="muted">僅顯示與目標資料日一致的股票，避免混入昨天舊資料。</div>
      <table>
        <thead>
          <tr>
            <th>代碼</th>
            <th>名稱</th>
            <th>市場</th>
            <th>資料日</th>
            <th>狀態</th>
            <th>收盤價</th>
            <th>成交量</th>
            <th>MA20</th>
            <th>MA60</th>
            <th>K值</th>
          </tr>
        </thead>
        <tbody id="stockTableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    function renderWarning(targetDate, dataDate, fallbackCount) {
      const warningEl = document.getElementById('dateWarning');

      if (!targetDate || !dataDate) {
        warningEl.textContent = '目前無法判定資料日期。';
        warningEl.className = 'warning';
        return;
      }

      if (targetDate === dataDate) {
        warningEl.innerHTML = `目前資料已對齊目標資料日 <span class="ok">${targetDate}</span>。FinMind 補資料數：${fallbackCount ?? 0}`;
        warningEl.className = 'warning ok';
      } else {
        warningEl.textContent = `目前目標資料日為 ${targetDate}，但實際最新資料日為 ${dataDate}，代表部分股票可能尚未更新完成。`;
        warningEl.className = 'warning';
      }
    }

    function renderTable(stocks, targetDate) {
      const tbody = document.getElementById('stockTableBody');
      tbody.innerHTML = '';

      const filtered = (stocks || []).filter(stock => stock.date === targetDate);

      for (const stock of filtered.slice(0, 100)) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${stock.code ?? ''}</td>
          <td>${stock.name ?? ''}</td>
          <td>${stock.market ?? ''}</td>
          <td>${stock.date ?? ''}</td>
          <td><span class="badge badge-match">最新</span></td>
          <td>${stock.close ?? ''}</td>
          <td>${stock.volume ?? ''}</td>
          <td>${stock.ma20 ?? ''}</td>
          <td>${stock.ma60 ?? ''}</td>
          <td>${stock.k_value ?? ''}</td>
        `;
        tbody.appendChild(tr);
      }

      if (filtered.length === 0) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td colspan="10">目前沒有符合目標資料日 ${targetDate} 的股票資料。</td>`;
        tbody.appendChild(tr);
      }
    }

    async function loadStockData() {
      try {
        const response = await fetch('./all_stocks_data.json');
        const data = await response.json();

        const updatedAt = data.updated_at ?? '未知';
        const targetDate = data.target_date ?? data.data_date ?? '未知';
        const dataDate = data.data_date ?? '未知';
        const totalStocks = data.total_valid_stocks ?? 0;
        const fallbackCount = data.fallback_updated_count ?? 0;

        document.getElementById('updatedAt').textContent = updatedAt;
        document.getElementById('targetDate').textContent = targetDate;
        document.getElementById('dataDate').textContent = dataDate;
        document.getElementById('totalStocks').textContent = totalStocks;
        document.getElementById('fallbackCount').textContent = fallbackCount;

        renderWarning(targetDate, dataDate, fallbackCount);
        renderTable(data.stocks ?? [], targetDate);
      } catch (error) {
        document.getElementById('updatedAt').textContent = '載入失敗';
        document.getElementById('targetDate').textContent = '載入失敗';
        document.getElementById('dataDate').textContent = '載入失敗';
        document.getElementById('totalStocks').textContent = '載入失敗';
        document.getElementById('fallbackCount').textContent = '載入失敗';
        document.getElementById('dateWarning').textContent = '無法載入 all_stocks_data.json';
        console.error(error);
      }
    }

    loadStockData();
  </script>
</body>
</html>
