name: Daily Stock Scanner (V2)

on:
  schedule:
    - cron: '30 8 * * 1-5' # UTC 08:30 = 台灣時間下午 16:30
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Python script (極速增量版)
        env:
          PYTHONUNBUFFERED: "1"
        run: python update_stocks.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add all_stocks_data.json historical_prices.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Daily update: stock prices and indicators $(date '+%Y-%m-%d %H:%M:%S %Z')" && git push)
