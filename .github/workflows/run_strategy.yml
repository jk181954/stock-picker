name: Daily Stock Scanner (V2)

on:
  schedule:
    - cron: '30 10 * * 1-5'  # 台灣時間 週一~週五 18:30，TPEX/TWSE afterTrading 已更新
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update script
        env:
          PYTHONUNBUFFERED: "1"
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python update_stocks.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add all_stocks_data.json historical_prices.json
          DATA_DATE=$(python -c "import json; d=json.load(open('all_stocks_data.json')); print(d.get('data_date','unknown'))" 2>/dev/null || echo "unknown")
          git diff --quiet && git diff --staged --quiet || (git commit -m "Daily update: stock prices and indicators data_date=${DATA_DATE}" && git push)
